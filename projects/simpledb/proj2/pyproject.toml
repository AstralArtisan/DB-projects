[tool.ruff]
# 1. 基础配置
line-length = 120
target-version = "py310"

# 排除不需要扫描的目录
exclude = [
    ".git",
    ".venv",
    "__pycache__",
    "build",
    "dist",
]

[tool.ruff.lint]
# 2. 启用规则 (核心部分)
# E4, E7, E9, F: 标准的 flake8 规则
# I:  Isort (自动排序 import) —— 必选！
# B:  Flake8-bugbear (发现潜在 Bug) —— 强烈推荐！
# UP: Pyupgrade (自动将老语法升级为新语法) —— 强烈推荐！
select = ["E4", "E7", "E9", "F", "I", "B", "UP"]

# 忽略的规则
# E501: 忽略“行太长”报错 (因为我们有 formatter 自动处理，处理不了的通常是长字符串，不需要报错)
ignore = ["E501"]

[tool.ruff.format]
# 3. 格式化风格
# 使用双引号 (默认就是 double，显式写出来更清晰)
quote-style = "double"

# 缩进使用空格
indent-style = "space"

# 魔法特性：自动格式化 docstring 里的代码示例
# 如果你在函数注释里写了 >>> print("hello")，它也会被格式化！
docstring-code-format = true

[tool.ruff.lint.isort]
# 4. Import 排序设置
# 告诉 ruff 哪些是你的“本地模块”，防止它把你的模块当成第三方库
# 比如你的项目叫 my_project
# known-first-party = ["my_project"]
